name: Refresh Platform Metrics

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Refresh Roblox chart snapshots
        run: |
          curl -f -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" https://ugc-trend-portal.vercel.app/api/roblox/import-all-charts

      - name: Refresh Fortnite island snapshots
        run: |
          curl -f -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" https://ugc-trend-portal.vercel.app/api/fortnite/import-islands

      - name: Run classification audit
        run: |
          curl -f -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" https://ugc-trend-portal.vercel.app/api/audit/classification

      - name: Run data integrity audit
        run: |
          curl -f -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" https://ugc-trend-portal.vercel.app/api/audit/data-integrity

      - name: Save dashboard snapshot
        run: |
          curl --fail --show-error --retry 3 --retry-all-errors --retry-delay 5 --max-time 60 -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" https://ugc-trend-portal.vercel.app/api/snapshots/dashboard

      - name: Precompute Roblox core dashboard payload
        run: |
          curl --fail --show-error --retry 2 --retry-all-errors --retry-delay 5 --max-time 180 -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" "https://ugc-trend-portal.vercel.app/api/dashboard/precompute?platform=roblox&scope=core"

      - name: Precompute Fortnite core dashboard payload
        run: |
          curl --fail --show-error --retry 2 --retry-all-errors --retry-delay 5 --max-time 180 -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" "https://ugc-trend-portal.vercel.app/api/dashboard/precompute?platform=fortnite&scope=core"

      - name: Let database load settle before full-history caches
        run: sleep 30

      - name: Precompute Roblox full dashboard payload
        continue-on-error: true
        run: |
          curl --fail --show-error --retry 2 --retry-all-errors --retry-delay 10 --max-time 180 -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" "https://ugc-trend-portal.vercel.app/api/dashboard/precompute?platform=roblox&scope=full"

      - name: Precompute Fortnite full dashboard payload
        continue-on-error: true
        run: |
          curl --fail --show-error --retry 2 --retry-all-errors --retry-delay 10 --max-time 180 -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" "https://ugc-trend-portal.vercel.app/api/dashboard/precompute?platform=fortnite&scope=full"
