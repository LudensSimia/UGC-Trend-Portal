name: Refresh Platform Metrics

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Refresh Roblox chart snapshots
        run: curl -f -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" https://ugc-trend-portal.vercel.app/api/roblox/import-all-charts

      - name: Refresh Fortnite island snapshots
        run: curl -f -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" https://ugc-trend-portal.vercel.app/api/fortnite/import-islands

      - name: Run classification audit
        run: curl -f -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" https://ugc-trend-portal.vercel.app/api/audit/classification
