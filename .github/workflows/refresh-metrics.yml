name: Refresh Roblox Metrics

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Call refresh endpoint
        run: curl -f -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" https://ugc-trend-portal.vercel.app/api/roblox/import-all-charts
